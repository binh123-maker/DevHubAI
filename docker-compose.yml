services:
  db:
    image: postgres:16-alpine
    container_name: devhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devhub}
      POSTGRES_DB: ${POSTGRES_DB:-devhub}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devhub} -d ${POSTGRES_DB:-devhub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devhub-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://devhub:devhub@db:5432/devhub
      CORS_ORIGINS: http://localhost,http://localhost:5173,http://localhost:3000
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devhub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
